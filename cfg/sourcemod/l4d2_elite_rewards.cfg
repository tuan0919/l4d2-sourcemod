// Bật/tắt toàn bộ hệ thưởng Temp HP.
l4d2_elite_reward_enable "1"
// Bật/tắt thưởng khi hạ SI (elite và normal nếu có bật normal reward).
l4d2_elite_reward_si_enable "1"
// Cho phép SI thường (không elite) cũng nhận reward Temp HP khi bị hạ.
l4d2_elite_reward_normal_si_enable "1"
// Bật/tắt thưởng khi hạ Tank.
l4d2_elite_reward_tank_enable "1"
// Bật/tắt thưởng khi hạ Witch.
l4d2_elite_reward_witch_enable "1"
// Ngưỡng HP thật + HP tạm sau khi cộng thưởng.
l4d2_elite_reward_temp_hp_limit "200"
// HP thưởng khi hạ Elite Smoker.
l4d2_elite_reward_smoker "10"
// HP thưởng khi hạ Elite Boomer.
l4d2_elite_reward_boomer "10"
// HP thưởng khi hạ Elite Hunter.
l4d2_elite_reward_hunter "10"
// HP thưởng khi hạ Elite Spitter.
l4d2_elite_reward_spitter "10"
// HP thưởng khi hạ Elite Jockey.
l4d2_elite_reward_jockey "10"
// HP thưởng khi hạ Elite Charger.
l4d2_elite_reward_charger "10"
// HP thưởng khi hạ SI thường (không elite). Chỉ dùng khi bật Normal SI Reward.
l4d2_elite_reward_normal_si_amount "5"
// Nhân thưởng nếu kết liễu bằng headshot.
l4d2_elite_reward_headshot_bonus_enable "1"
// Hệ số nhân thưởng khi headshot (ví dụ 2.0).
l4d2_elite_reward_headshot_bonus_multiplier "2.0"
// Bật nhân thưởng theo z_difficulty hiện tại.
l4d2_elite_reward_scale_by_difficulty "1"
// Hệ số thưởng khi độ khó easy.
l4d2_elite_reward_diff_easy "0.8"
// Hệ số thưởng khi độ khó normal.
l4d2_elite_reward_diff_normal "1.0"
// Hệ số thưởng khi độ khó hard/advanced.
l4d2_elite_reward_diff_hard "1.2"
// Hệ số thưởng khi độ khó impossible/expert.
l4d2_elite_reward_diff_expert "1.5"
// Cách phát thưởng khi hạ Tank.
l4d2_elite_reward_tank_mode "1"
// Lượng thưởng cơ bản khi hạ Tank.
l4d2_elite_reward_tank_amount "20"
// Cách phát thưởng khi hạ Witch.
l4d2_elite_reward_witch_mode "0"
// Lượng thưởng cơ bản khi hạ Witch.
l4d2_elite_reward_witch_amount "30"
// Bật/tắt instructor hint khi nhận thưởng.
l4d2_elite_reward_show_hint "1"
// Màu hint khi hạ normal SI, định dạng: R G B (mặc định 255 255 255).
l4d2_elite_reward_hint_color_normal_si "255 255 255"
// Màu hint khi hạ elite SI, định dạng: R G B (mặc định 255 255 0).
l4d2_elite_reward_hint_color_elite_si "255 255 0"