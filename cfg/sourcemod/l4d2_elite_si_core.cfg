// 0=Off, 1=On.
l4d2_elite_si_core_enable "1"

// Chance (0-100) that a spawned SI becomes Elite.
l4d2_elite_si_core_spawn_chance "50"

// Cooldown in seconds between successful elite SI spawns (0=Off).
l4d2_elite_si_core_spawn_cooldown "20.0"

// Elite HP multiplier for non-Tank Elite SI.
l4d2_elite_si_core_hp_multiplier "2.5"

// Elite Tank HP multiplier. Tank uses this instead of the generic Elite HP multiplier.
l4d2_elite_si_core_tank_hp_multiplier "1.2"

// Relative weight for Smoker elite to roll Abnormal behavior.
