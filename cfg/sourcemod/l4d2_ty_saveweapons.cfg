// Controls l4d2_ty_saveweapons.
// Keep weapon/item restore, but let level_start_heal own survivor HP/BW reset.

// 0 = do not force full health during map_transition.
l4d2_ty_saveweapons_health "0"

// 0 = do not save/restore survivor health on the next chapter.
// This prevents overwriting level_start_heal's 100 HP restore.
l4d2_ty_saveweapons_save_health "0"

// Keep normal weapon restore behavior.
l4d2_ty_saveweapons_save_bot "1"
l4d2_ty_saveweapons_save_character "0"
l4d2_ty_saveweapons_game_seconds_block "60"
