// Test preset for l4d_incapped_weapons self-revive flow
// Usage in server console: exec sourcemod/l4d_incapped_weapons_test.cfg

sm_cvar l4d_incapped_weapons_allow "1"

// Enable self-revive by item use
sm_cvar l4d_incapped_weapons_heal_pills "-1"
sm_cvar l4d_incapped_weapons_heal_adren "-1"

// Make test fast and obvious
sm_cvar l4d_incapped_weapons_delay_pills "0.0"
sm_cvar l4d_incapped_weapons_delay_adren "0.0"
sm_cvar l4d_incapped_weapons_delay_text "2"
sm_cvar l4d_incapped_weapons_heal_text "1"

// Keep revive deterministic during testing
sm_cvar l4d_incapped_weapons_revive "0"
sm_cvar l4d_incapped_weapons_health "30"
sm_cvar l4d_incapped_weapons_heal_revive "0"

// Keep default restrictions and behavior
sm_cvar l4d_incapped_weapons_restrict "12,24,30,31"
sm_cvar l4d_incapped_weapons_pistol "0"
sm_cvar l4d_incapped_weapons_melee "0"
sm_cvar l4d_incapped_weapons_throw "0"

// Apply on all game modes
sm_cvar l4d_incapped_weapons_modes ""
sm_cvar l4d_incapped_weapons_modes_off ""
sm_cvar l4d_incapped_weapons_modes_tog "0"
