// Notifier
// Bật/tắt thông báo Death/Incap.
sm_cvar tuan_notifier_di_enable "0"
// Thông báo khi bị ai đó bắn gục.
sm_cvar tuan_notifier_di_notify_incap_other "0"
// Thông báo khi giết ai đó.
sm_cvar tuan_notifier_di_notify_kill_other "0"
// Thông báo khi chết do môi trường.
sm_cvar tuan_notifier_di_notify_killed_by_unknown "0"
// Thông báo khi gục do môi trường.
sm_cvar tuan_notifier_di_notify_incapped_by_unknown "0"
// Tắt kill feedback HUD bên phải.
sm_cvar l4d2_show_hud_messages_kill_feed "0"
// Bật/tắt thông báo trắng đen.
sm_cvar tuan_notifier_bw_enable "1"
// Thông báo khi cứu thương người B&W.
sm_cvar tuan_notifier_bw_notify_healed_other "1"
// Thông báo khi một người rơi vào B&W.
sm_cvar tuan_notifier_bw_notify_go_bnw "1"
// Thông báo khi gọi người khác dậy.
sm_cvar tuan_notifier_bw_notify_revived_other "1"
// Bật/tắt thông báo ném lựu đạn.
sm_cvar l4d_throwable_announcer_enable "1"
// 1=Surv, 2=Inf, 4=Spec. (Ví dụ 3 là Surv+Inf)
sm_cvar l4d_throwable_announcer_team "1"
// Thông báo cho bản thân.
sm_cvar l4d_throwable_announcer_self "1"
// Delay để bỏ qua fake throw (s).
sm_cvar l4d_throwable_announcer_fake_throw "0.3"
// Thông báo ném Molotov.
sm_cvar l4d_throwable_announcer_molotov "1"
// Thông báo ném Pipebomb.
sm_cvar l4d_throwable_announcer_pipebomb "1"
// Thông báo ném Bile/Boomer Vomit.
sm_cvar l4d_throwable_announcer_vomitjar "1"
// Bật/tắt thông báo bắn nổ.
sm_cvar l4d_explosion_announcer_enable "1"
// 1=Surv, 2=Inf, 4=Spec.
sm_cvar l4d_explosion_announcer_team "1"
// Thời gian delay chống spam chat.
sm_cvar l4d_explosion_announcer_spam_protection "3.0"
// Thông báo cho bản thân.
sm_cvar l4d_explosion_announcer_self "1"
// Thông báo nổ bình xăng.
sm_cvar l4d_explosion_announcer_gascan "1"
// Thông báo nổ bình gas.
sm_cvar l4d_explosion_announcer_propanecanister "1"
// Thông báo nổ bình oxy.
sm_cvar l4d_explosion_announcer_oxygentank "1"
// Thông báo nổ pháo hoa.
sm_cvar l4d_explosion_announcer_fireworkscrate "1"
// Thông báo nổ thùng dầu lớn.
sm_cvar l4d_explosion_announcer_fuelbarrel "1"
