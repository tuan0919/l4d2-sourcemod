// 0=Off, 1=On.
l4d2_elite_si_spitter_sneaky_enable "1"

// Render alpha while cloaked (102 ~= 60% fade).
l4d2_elite_si_spitter_sneaky_cloak_alpha "102"

// Duration in seconds of each cloak window.
l4d2_elite_si_spitter_sneaky_cloak_duration "5.0"

// Cooldown in seconds after cloak ends before next cloak can start.
l4d2_elite_si_spitter_sneaky_cloak_cooldown "8.0"

// Cooldown in seconds between each of the 3 manual acid spits.
l4d2_elite_si_spitter_sneaky_spit_cooldown "3.0"
