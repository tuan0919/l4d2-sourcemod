// 0=Off, 1=On.
l4d2_elite_si_jockey_jumper_enable "1"

// Upward velocity added to the ridden survivor on each Jumper bounce.
l4d2_elite_si_jockey_jumper_force "450.0"

// Minimum delay before Jumper bounces again.
l4d2_elite_si_jockey_jumper_time_min "0.1"

// Maximum delay before Jumper bounces again.
l4d2_elite_si_jockey_jumper_time_max "0.2"
