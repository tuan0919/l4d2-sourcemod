// 0=Off, 1=On.
l4d2_elite_si_smoker_ignitor_enable "1"

// Duration in seconds for the burn debuff applied by Ignitor Smoker.
l4d2_elite_si_smoker_ignitor_burn_duration "8.0"

// Damage per second dealt by the Ignitor Smoker burn debuff.
l4d2_elite_si_smoker_ignitor_burn_damage_per_second "4.0"

// Interval in seconds between Ignitor Smoker burn damage ticks.
l4d2_elite_si_smoker_ignitor_burn_interval "0.5"

// Duration in seconds for the inferno spawned on Ignitor Smoker death.
l4d2_elite_si_smoker_ignitor_death_fire_duration "10.0"

// 0=Off, 1=Show instructor hint to survivors taking Ignitor fire damage.
l4d2_elite_si_smoker_ignitor_hint_enable "1"

// Instructor hint color for Ignitor fire damage in format 'R G B'.
l4d2_elite_si_smoker_ignitor_hint_color "255 140 40"

// Minimum interval in seconds between Ignitor fire hints per survivor.
l4d2_elite_si_smoker_ignitor_hint_interval "3.0"
