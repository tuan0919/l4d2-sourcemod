// Elite ChargerAction profile (test)
// ChargerAction should only apply to elite subtype ChargerAction.
// Keep this file for quick tuning during test rounds.

// 0=Plugin off, 1=Plugin on.
l4d2_charger_allow "1"

// 0=Apply to all chargers. 1=Only elite charger subtype.
l4d2_charger_elite_only "1"

// Subtype id for ChargerAction elite. Must match elite reward plugin.
l4d2_charger_elite_subtype "3"

// Bots can: 0=Grab(default), 1=Fling, 2=Random.
l4d2_charger_bots "1"

// Humans can: 0=Grab(default), 1=Fling.
l4d2_charger_charge "1"

// Damage on collision / grab.
l4d2_charger_damage "12"

// After carrying and charging: 0=Pummel, 1=Drop, 2=Drop if incap, 3=Both, 4=Continue carry.
l4d2_charger_finish "3"

// Auto-pickup incapped: 0=Off, 1=On, 2=Only if not pinned.
l4d2_charger_incapped "1"

// Jump while charging: 0=Off, 1=When alone, 2=Also while carrying.
l4d2_charger_jump "2"

// 0=Unlimited jumps per charge.
l4d2_charger_jumps "2"

// Pickup bitmask.
l4d2_charger_pickup "31"

// Pummel control while carrying.
l4d2_charger_pummel "2"

// Punch while charging.
l4d2_charger_punch "1"

// Repeat charge when carry and meter refilled.
l4d2_charger_repeat "0"

// Survivor shove behavior bitmask.
l4d2_charger_shove "7"
