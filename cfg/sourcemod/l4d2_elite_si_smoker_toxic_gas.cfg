// 0=Off, 1=On.
l4d2_elite_si_smoker_toxic_gas_enable "1"

// Movement speed multiplier for Toxic Gas smoker bot.
l4d2_elite_si_smoker_toxic_gas_speed_multiplier "1.2"

// Cooldown in seconds before shove-triggered toxic cloud can trigger again.
l4d2_elite_si_smoker_toxic_gas_cloud_cooldown "10.0"

// Duration in seconds for toxic smoke cloud.
l4d2_elite_si_smoker_toxic_gas_cloud_duration "12.0"

// Radius of the toxic smoke cloud.
l4d2_elite_si_smoker_toxic_gas_cloud_radius "230.0"

// Damage per second dealt to survivors inside toxic smoke.
l4d2_elite_si_smoker_toxic_gas_damage_per_second "10.0"

// Interval in seconds between toxic smoke damage ticks.
l4d2_elite_si_smoker_toxic_gas_damage_interval "0.2"

// 0=Off, 1=Show instructor hint to survivors taking toxic gas damage.
l4d2_elite_si_smoker_toxic_gas_hint_enable "1"

// Instructor hint color for toxic gas damage in format 'R G B'.
l4d2_elite_si_smoker_toxic_gas_hint_color "80 80 80"

// Minimum interval in seconds between toxic gas hints per survivor.
l4d2_elite_si_smoker_toxic_gas_hint_interval "1.5"
