// 0=Off, 1=On.
l4d2_elite_charger_steering_enable "1"

// 0=Apply to all bot chargers, 1=Only elite subtype chargers.
l4d2_elite_charger_steering_elite_only "1"

// Subtype id required when elite_only=1.
l4d2_elite_charger_steering_subtype "3"

// Steering blend per frame (0.0-1.0).
l4d2_elite_charger_steering_strength "0.22"

// Maximum range to search survivor target.
l4d2_elite_charger_steering_target_range "1200.0"

// 0=Can target incapped survivors, 1=Ignore incapped survivors.
l4d2_elite_charger_steering_ignore_incapped "0"

// Minimum horizontal speed while steering.
l4d2_elite_charger_steering_min_speed "250.0"
